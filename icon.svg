<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0f2b"/>
      <stop offset="100%" style="stop-color:#10123a"/>
    </linearGradient>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="50%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(99,102,241,0.35)"/>
      <stop offset="100%" style="stop-color:rgba(30,40,120,0.55)"/>
    </linearGradient>
    <linearGradient id="arcGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Fundo arredondado -->
  <rect x="20" y="20" width="472" height="472" rx="90" ry="90" fill="url(#bgGrad)"/>
  <rect x="20" y="20" width="472" height="472" rx="90" ry="90"
        fill="none" stroke="url(#borderGrad)" stroke-width="6" opacity="0.9"/>

  <!-- Reflexo superior -->
  <ellipse cx="256" cy="80" rx="140" ry="30" fill="white" opacity="0.04"/>

  <!-- Escudo -->
  <path d="M256,100 L375,148 L375,268 Q375,342 256,390 Q137,342 137,268 L137,148 Z"
        fill="url(#shieldGrad)" stroke="rgba(139,92,246,0.6)" stroke-width="2.5" filter="url(#glow)"/>
  <path d="M256,108 L292,122 L292,185 Q292,208 256,222 Q220,208 220,185 L220,122 Z"
        fill="white" opacity="0.05"/>

  <!-- Arco de fundo -->
  <circle cx="256" cy="252" r="75" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="10"/>
  <!-- Arco ciano -->
  <circle cx="256" cy="252" r="75" fill="none"
          stroke="url(#arcGrad)" stroke-width="10"
          stroke-dasharray="354 118"
          stroke-dashoffset="88"
          stroke-linecap="round"
          filter="url(#softglow)"
          transform="rotate(-90 256 252)"/>

  <!-- Marcações -->
  <g stroke="rgba(255,255,255,0.25)" stroke-width="2">
    <line x1="256" y1="170" x2="256" y2="180" transform="rotate(30 256 252)"/>
    <line x1="256" y1="170" x2="256" y2="180" transform="rotate(60 256 252)"/>
    <line x1="256" y1="170" x2="256" y2="180" transform="rotate(90 256 252)"/>
    <line x1="256" y1="170" x2="256" y2="180" transform="rotate(120 256 252)"/>
    <line x1="256" y1="170" x2="256" y2="180" transform="rotate(150 256 252)"/>
    <line x1="256" y1="170" x2="256" y2="180" transform="rotate(180 256 252)"/>
    <line x1="256" y1="170" x2="256" y2="180" transform="rotate(210 256 252)"/>
    <line x1="256" y1="170" x2="256" y2="180" transform="rotate(240 256 252)"/>
    <line x1="256" y1="170" x2="256" y2="180" transform="rotate(270 256 252)"/>
    <line x1="256" y1="170" x2="256" y2="180" transform="rotate(300 256 252)"/>
    <line x1="256" y1="170" x2="256" y2="180" transform="rotate(330 256 252)"/>
  </g>

  <!-- Maçã -->
  <path d="M256,225 C237,225 222,240 222,262 C222,287 237,304 256,304 C275,304 290,287 290,262 C290,240 275,225 256,225 Z"
        fill="rgba(139,92,246,0.80)" filter="url(#glow)"/>
  <path d="M256,222 C256,222 261,211 270,209 C270,209 267,219 256,222 Z"
        fill="rgba(139,92,246,0.95)"/>
  <line x1="256" y1="222" x2="256" y2="227" stroke="rgba(139,92,246,0.95)" stroke-width="2.5" stroke-linecap="round"/>
  <ellipse cx="245" cy="240" rx="5" ry="7" fill="white" opacity="0.18" transform="rotate(-20 245 240)"/>
</svg>

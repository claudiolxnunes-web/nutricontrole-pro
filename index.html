<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nutricontrole Pro 6.1</title>

  <link rel="stylesheet" href="css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="app-shell">

  <!-- TOPO -->
  <header class="top-header">
    <div class="brand">Nutricontrole Pro 6.1</div>

    <div class="date-box">
      <input type="date" id="dataRegistro">
    </div>
  </header>

  <!-- ABAS -->
  <nav class="tabs">
    <button class="tab active" onclick="trocarTela('painel', this)">Painel</button>
    <button class="tab" onclick="trocarTela('diario', this)">Diário</button>
    <button class="tab" onclick="trocarTela('glicemia', this)">Histórico</button>
    <button class="tab" onclick="trocarTela('metas', this)">Metas</button>
  </nav>

  <main class="content">

    <!-- ================= PAINEL ================= -->
    <div id="painel" class="tela">

      <section class="dashboard-grid">

        <!-- ESQUERDA -->
        <div class="left-column">

          <section class="panel card">
            <div class="mini-kpis">
              <div class="mini-card">
                <span class="mini-title">Calorias</span>
                <strong id="kpiCalorias">0</strong>
              </div>

              <div class="mini-card">
                <span class="mini-title">Proteínas</span>
                <strong id="kpiProteinas">0g</strong>
              </div>
            </div>

            <div class="meta-row">
              <span>Meta Proteica</span>
              <span id="metaProteinaTexto">0 g</span>
            </div>

            <div class="progress-bar">
              <div class="progress-fill" id="barraProteina"></div>
            </div>

            <div class="meta-row">
              <span>Meta Energética</span>
              <span id="metaEnergiaTexto">0 kcal</span>
            </div>

            <div class="progress-bar">
              <div class="progress-fill energy-fill" id="barraEnergia"></div>
            </div>
          </section>

          <section class="card">
            <h2>Dados do dia</h2>

            <div class="form-grid">
              <input id="peso" type="number" placeholder="Peso">
              <input id="altura" type="number" placeholder="Altura">
              <input id="glicose" type="number" placeholder="Glicose">
              <input id="ps" type="number" placeholder="Pressão sistólica">
              <input id="pd" type="number" placeholder="Pressão diastólica">

              <select id="nivelAtividade">
                <option value="sedentario">Sedentário</option>
                <option value="leve">Leve</option>
                <option value="moderado">Moderado</option>
                <option value="alto">Alto</option>
                <option value="muito_alto">Muito alto</option>
              </select>

              <select id="objetivo">
                <option value="perder_gordura">Perder gordura</option>
                <option value="manter">Manter</option>
                <option value="ganhar_massa">Ganhar massa</option>
              </select>
            </div>

            <button onclick="salvar()">Salvar</button>
          </section>

          <section class="summary-grid">
            <div class="card summary-box">
              <span>IMC</span>
              <strong id="imc">-</strong>
            </div>

            <div class="card summary-box">
              <span>Classificação</span>
              <strong id="classificacao">-</strong>
            </div>
          </section>

        </div>

        <!-- DIREITA -->
        <div class="right-column">
          <section class="card">
            <h2>Evolução</h2>

            <div class="chart-toolbar">
              <button onclick="trocarGrafico('peso')">Peso</button>
              <button onclick="trocarGrafico('imc')">IMC</button>
              <button onclick="trocarGrafico('glicose')">Glicose</button>
              <button onclick="trocarGrafico('pressao')">Pressão</button>
            </div>

            <div class="chart-toolbar">
              <button onclick="trocarPeriodoGrafico(7)">7 dias</button>
              <button onclick="trocarPeriodoGrafico(30)">30 dias</button>
              <button onclick="trocarPeriodoGrafico(90)">90 dias</button>
              <button onclick="trocarPeriodoGrafico(0)">Todos</button>
            </div>

            <canvas id="graficoPainel"></canvas>
          </section>
        </div>

      </section>
    </div>

    <!-- ================= DIÁRIO ================= -->
    <div id="diario" class="tela" style="display:none;">

      <section class="card">
        <h2>Diário alimentar</h2>

        <div class="meal-tabs">
          <button class="meal-tab active" onclick="trocarRefeicao('cafe', this)">Café da manhã</button>
          <button class="meal-tab" onclick="trocarRefeicao('almoco', this)">Almoço</button>
          <button class="meal-tab" onclick="trocarRefeicao('jantar', this)">Jantar</button>
          <button class="meal-tab" onclick="trocarRefeicao('lanches', this)">Lanches</button>
        </div>

        <div id="refeicaoContent" class="meal-content"></div>
      </section>

    </div>

    <!-- ================= HISTÓRICO ================= -->
    <div id="glicemia" class="tela" style="display:none;">
      <section class="card">
        <h2>Histórico</h2>
        <table id="tabelaHistorico">
          <thead>
            <tr>
              <th>Data</th>
              <th>Peso</th>
              <th>IMC</th>
              <th>Glicose</th>
              <th>Pressão</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </section>
    </div>

    <!-- ================= METAS ================= -->
    <div id="metas" class="tela" style="display:none;">
      <section class="card">
        <h2>Metas</h2>
        <input id="metaProteinaManual" placeholder="Proteína (g)">
        <input id="metaEnergiaManual" placeholder="Energia (kcal)">
        <button onclick="salvarMetasManuais()">Salvar</button>
      </section>
    </div>

  </main>
</div>

<!-- SCRIPTS CORRETOS (IMPORTANTE!) -->
<script>
  console.log("INDEX HTML CARREGADO");
</script>

<script src="./js/config.js"></script>
<script src="./js/meals.js"></script>
<script src="./js/charts.js"></script>
<script src="./js/app.js"></script>

</body>
</html>
